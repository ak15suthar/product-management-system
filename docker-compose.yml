version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: product_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/product_management?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-production-secret}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/src/uploads
      - exports:/app/src/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
  exports:
